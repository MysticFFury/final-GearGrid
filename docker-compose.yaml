version: "3.8"

services:
    mysql:
        image: mysql:8.0
        container_name: handsOn-a-mysql
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: admidPassw0rd!
            MYSQL_DATABASE: handson_admin
            MYSQL_USER: handson_A
            MYSQL_PASSWORD: handson_A
        ports:
            - "3308:3306"
        volumes:
            - mysql-data:/var/lib/mysql
        networks:
            - ralf_network

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: handsOn-Admin-phpmyadmin
        restart: always
        environment:
            PMA_HOST: mysql
            PMA_PORT: 3306
            PMA_USER: handson_A
            PMA_PASSWORD: handson_A
        ports:
            - "8081:80"
        depends_on:
            - mysql
        networks:
            - ralf_network

volumes:
    mysql-data:

networks:
    ralf_network:
