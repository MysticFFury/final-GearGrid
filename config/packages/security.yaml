# config/packages/security.yaml

security:
    # Password hashing
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # User providers
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # Firewalls
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\LoginAuthenticator
            user_checker: App\Security\UserChecker
            logout:
                path: app_logout
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    # Access control
    access_control:

        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/logout$, roles: PUBLIC_ACCESS }
        - { path: ^/register$, roles: PUBLIC_ACCESS }

        # Dashboard - Admin & Staff
        - { path: ^/dashboard, roles: [ROLE_ADMIN, ROLE_STAFF] }
        
        # Admin-only areas (staff cannot access)
        - { path: ^/log, roles: ROLE_ADMIN }
        - { path: ^/user, roles: ROLE_ADMIN }
        - { path: ^/admin, roles: ROLE_ADMIN }

        # Products, Categories & Orders - Admin & Staff
        - { path: ^/product, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/category, roles: [ROLE_ADMIN, ROLE_STAFF] }
        - { path: ^/order, roles: [ROLE_ADMIN, ROLE_STAFF] }

        # Profile - All authenticated users
        - { path: ^/profile, roles: ROLE_USER }

        # Customer landing page should be public
        - { path: ^/customer-landing$, roles: PUBLIC_ACCESS }

        # Public customer marketing pages
        - { path: ^/customer-about$, roles: PUBLIC_ACCESS }
        - { path: ^/customer-products$, roles: PUBLIC_ACCESS }
        - { path: ^/customer-services$, roles: PUBLIC_ACCESS }
        - { path: ^/customer-contact$, roles: PUBLIC_ACCESS }

        # Any other pages require login
        - { path: ^/, roles: ROLE_USER }

# Test environment overrides
when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4      # for bcrypt
                time_cost: 3 # for argon2i/argon2id
                memory_cost: 10
